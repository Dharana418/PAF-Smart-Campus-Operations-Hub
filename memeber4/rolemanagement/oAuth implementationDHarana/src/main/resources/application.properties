spring.application.name=booking-system

server.port=8080


spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

app.security.jwt.secret=replace-with-a-very-long-random-secret-key-at-least-32-bytes
app.security.jwt.expiration-minutes=120
app.security.allowed-origins=http://localhost:5173
app.security.admin-emails=${ADMIN_EMAILS:admin@smartcampus.com}
app.frontend.redirect-uri=http://localhost:5173/oauth/success

# MongoDB configuration (set as an environment variable to avoid committing secrets)
# Example PowerShell:
# $Env:MONGO_URI="mongodb+srv://thiyunuwan567_db_user:YOUR_PASSWORD@cluster0.wyq22qs.mongodb.net/bookingdb?retryWrites=true&w=majority"
spring.mongodb.uri=${MONGO_URI:mongodb://localhost:27017/smartcampusdb}

# Google OAuth credentials should be provided via env vars `GOOGLE_CLIENT_ID` and `GOOGLE_CLIENT_SECRET`.
